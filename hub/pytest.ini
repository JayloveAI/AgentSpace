[pytest]
# pytest 配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 标记
markers =
    acceptance: 验收测试 (UAT)
    e2e: 端到端测试
    unit: 单元测试

# 异步测试
asyncio_mode = auto

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=hub_server
    --cov=client_sdk
    --cov-report=html
    --cov-report=term-missing

# 最小覆盖率
cov-fail-under = 80
